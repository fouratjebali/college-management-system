version: '3.8'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: miniprojet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: miniprojet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - miniprojet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: miniprojet-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/miniprojet_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - miniprojet-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  miniprojet-network:
    driver: bridge

