# Production Environment Profile
# Used when SPRING_PROFILES_ACTIVE=prod (production deployment only)

spring.application.name=Backend-miniprojet
server.port=8080

# Database Configuration - Production PostgreSQL
spring.datasource.url=jdbc:postgresql://proddb.example.com:5432/institut_db
spring.datasource.username=${DATABASE_USER:institut_user}
spring.datasource.password=${DATABASE_PASSWORD:default}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling - Production optimized
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate - VALIDATE ensures schema matches (no auto-updates)
# Schema changes must be applied manually by DBA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration - Should be externalized via environment variables
jwt.secret=${JWT_SECRET:changeme-in-production}
jwt.expiration=86400000

# Logging - Production level (no debug output)
logging.level.root=WARN
logging.level.MiniProjet_Backend=INFO
logging.level.org.springframework=WARN

# Server Configuration
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-binding-errors=never
