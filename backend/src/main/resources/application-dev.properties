# Development Environment Profile
# Used when SPRING_PROFILES_ACTIVE=dev (default for local development)

spring.application.name=Backend-miniprojet
server.port=8080

# Database Configuration - Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/miniprojet_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - CREATE-DROP for rapid development/testing
# WARNING: All data is lost on application restart
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationAndValidationPurposeOnly123456789
jwt.expiration=86400000

# Logging - More verbose for debugging
logging.level.root=INFO
logging.level.MiniProjet_Backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
