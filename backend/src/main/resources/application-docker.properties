# Docker Environment Profile
# Used when SPRING_PROFILES_ACTIVE=docker (in docker-compose.yml)

spring.application.name=Backend-miniprojet
server.port=8080

# Database Configuration - Docker Service
spring.datasource.url=jdbc:postgresql://postgres:5432/institut_db
spring.datasource.username=institut_user
spring.datasource.password=institut_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - UPDATE preserves data across container restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationAndValidationPurposeOnly123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.root=INFO
logging.level.MiniProjet_Backend=DEBUG
