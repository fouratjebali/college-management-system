spring.application.name=Backend-miniprojet
server.port=8080

# DOCKER DEPLOYMENT (Development Environment in Containers)
# Database Configuration - Docker PostgreSQL service
spring.datasource.url=jdbc:postgresql://postgres:5432/institut_db
spring.datasource.username=institut_user
spring.datasource.password=institut_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - update preserves data across container restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationAndValidationPurposeOnly123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Sprint 2 - Course materials upload
app.file-storage.upload-dir=/app/uploads/course-materials
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Development seed data for admin flow
app.seed.admin.email=admin@issatso.tn
app.seed.admin.password=Admin@12345

# Logging - Development level
logging.level.root=INFO
logging.level.MiniProjet_Backend=DEBUG
