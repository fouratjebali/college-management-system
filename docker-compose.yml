services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: institut-db
    environment:
      POSTGRES_DB: institut_db
      POSTGRES_USER: institut_user
      POSTGRES_PASSWORD: institut_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - institut-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U institut_user -d institut_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: institut-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/institut_db
      SPRING_DATASOURCE_USERNAME: institut_user
      SPRING_DATASOURCE_PASSWORD: institut_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - institut-network
    volumes:
      - ./backend/uploads:/app/uploads

  # Angular Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: institut-frontend
    ports:
      - "4200:4200"
    environment:
      API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - institut-network
    command: npm start

volumes:
  postgres_data:

networks:
  institut-network:
    driver: bridge
